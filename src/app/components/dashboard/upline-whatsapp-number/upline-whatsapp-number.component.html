<main class="min-h-full-with-header">
  <div data-v-f43ca18c="" class="pb-20 relative">
    <div class="mb-20">
      <header class="h-12 p-3 bg-secondary text-global-font-on-dark text-14 flex items-center justify-center">Upline WhatsApp Number<div class="icon-close text-16 absolute right-4" routerLink="/home"></div>
      </header>
      <div class="content px-4 py-2">
        <div class="w-full py-2 text-15">
          <div *ngIf="number?.number!==''">
            <div class="ml-2 text-15 font-bold h-20px mb-8px">WhatsApp Number</div>
            <div class="h-14 px-2 py-4px bg-white flex justify-between items-center rounded-xl">
              <div class="ml-2 flex item-center">
                <span class="icon-whatsapp whatsapp mr-5px text-16"></span><a
                  href="https://msng.link/o/?{{number?.number}}=wa" class="text-back-600">{{number?.number}}</a>
                </div>
                <a href="https://msng.link/o/?{{number?.number}}=wa" class="icon-phone-outgoing text-button-normal bg-button-normal text-18 p-3 rounded-lg disabled:bg-black-300 disabled:text-black-600 disabled:cursor-not-allowed" [style.backgroundImage]="jsonWebdt?.imagesBottomBorderColor"></a>
            </div>
          </div>
          <div class="mt-13px"></div>
        </div>

        <div class="content py-2">
          <div class="ml-2 text-15 font-bold mb-8px">Agent Number</div>
          <div *ngIf="number?.bkashNumber!=='-'" class="h-14 px-2 bg-white flex justify-between items-center rounded-xl mb-2">
            <div class="ml-2 flex items-center gap-2">
              <img src="assets/images/payments/bkash.webp" width="22" />
              <span class="text-14">Bkash</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="px-3 py-3 bg-gray-100 rounded-lg text-17">
                {{number?.bkashNumber}}
              </span>
              <a (click)="copyToClipboard(number?.bkashNumber)" class="text-button-normal bg-button-normal text-18 p-3 rounded-lg disabled:bg-black-300 disabled:text-black-600 disabled:cursor-not-allowed" [style.backgroundImage]="jsonWebdt?.imagesBottomBorderColor"><i class="fa fa-clone" style="margin-right: 3px;"></i></a>
            </div>
          </div>

          <div *ngIf="number?.nagagNumber!=='-'" class="h-14 px-2 bg-white flex justify-between items-center rounded-xl mb-2">
            <div class="ml-2 flex items-center gap-2">
              <img src="assets/images/payments/nagad.webp" width="22" />
              <span class="text-14">Nagad</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="px-3 py-3 bg-gray-100 rounded-lg text-17">
                {{number?.nagagNumber}}
              </span>
              <a (click)="copyToClipboard(number?.nagagNumber)" class="text-button-normal bg-button-normal text-18 p-3 rounded-lg disabled:bg-black-300 disabled:text-black-600 disabled:cursor-not-allowed" [style.backgroundImage]="jsonWebdt?.imagesBottomBorderColor"><i class="fa fa-clone" style="margin-right: 3px;"></i></a>
            </div>
          </div>

          <div *ngIf="number?.rocketNumber!=='-'" class="h-14 px-2 bg-white flex justify-between items-center rounded-xl">
            <div class="ml-2 flex items-center gap-2">
              <img src="assets/images/payments/rocket.webp" width="22" />
              <span class="text-14">Rocket</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="px-3 py-3 bg-gray-100 rounded-lg text-17">
                {{number?.rocketNumber}}
              </span>
              <a (click)="copyToClipboard(number?.rocketNumber)" class="text-button-normal bg-button-normal text-18 p-3 rounded-lg disabled:bg-black-300 disabled:text-black-600 disabled:cursor-not-allowed" [style.backgroundImage]="jsonWebdt?.imagesBottomBorderColor"><i class="fa fa-clone" style="margin-right: 3px;"></i></a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>
<div *ngIf="loading">
  <app-loader></app-loader>
</div>

<div *ngIf="isCopied" class="copy-popup">
  <span>Copied to Clipboard!</span>
</div>
