
<!-- stake setting -->

<div data-v-3c51d876="" bis_skin_checked="1" >
  <div data-v-3c51d876="" class="absolute top-0 w-full h-full z-50" [@slideInOut]  bis_skin_checked="1" style=""></div>
  
  <div data-v-05b4889a="" data-v-3c51d876="" class="setting-wrapper" bis_skin_checked="1">
    <div data-v-05b4889a="" class="absolute top-0 w-full h-full z-50" bis_skin_checked="1" style=""></div>
    <div data-v-05b4889a="" class="setting fixed z-50 container bottom-0" bis_skin_checked="1" style="">
      <div data-v-05b4889a=""
        class="setting-content bg-secondary flex flex-col p-1 pb-0 h-full overscroll-y-none rounded-t-xl"
        bis_skin_checked="1">
        <div data-v-05b4889a="" class="setting-header flex justify-center items-center py-2" bis_skin_checked="1"><span
            data-v-05b4889a="" class="setting-title mx-4 pb-2 text-pop-title font-bold">Default stake setting</span>
          <div data-v-05b4889a="" (click)="closeStake()"
            class="icon-close absolute right-2 top-4 justify-center items-center mr-2 cursor-pointer text-global-font-on-dark text-14"
            bis_skin_checked="1"></div>
        </div>
        <div data-v-05b4889a="" class="bg-black-200 rounded-t-lg py-2 px-1 flex" bis_skin_checked="1">
          <div data-v-05b4889a="" class="input-box h-40px mx-1 flex-1 flex items-center justify-center"
            bis_skin_checked="1" (click)="stakeFocus(1)"><span data-v-05b4889a="" name="index" [ngClass]="stakeFocusnum == 1 ? 'is-focus' : 'is-default'"
              class="sum w-10 h-10 flex-1 flex justify-center items-center font-bold overflow-hidden mx-1 rounded-lg border-solid text-global-font-on-light bg-white"
              value="10">{{stakeArr.stake1}}</span></div>
          <div data-v-05b4889a="" class="input-box h-40px mx-1 flex-1 flex items-center justify-center"
            bis_skin_checked="1" (click)="stakeFocus(2)"><span data-v-05b4889a="" name="index" [ngClass]="stakeFocusnum == 2 ? 'is-focus' : 'is-default'"
              class="sum w-10 h-10 flex-1 flex justify-center items-center font-bold overflow-hidden mx-1 rounded-lg border-solid text-global-font-on-light bg-white "
              value="50">{{stakeArr.stake2}}</span></div>
          <div data-v-05b4889a="" class="input-box h-40px mx-1 flex-1 flex items-center justify-center"
            bis_skin_checked="1" (click)="stakeFocus(3)"><span data-v-05b4889a="" name="index" [ngClass]="stakeFocusnum == 3 ? 'is-focus' : 'is-default'"
              class="sum w-10 h-10 flex-1 flex justify-center items-center font-bold overflow-hidden mx-1 rounded-lg border-solid text-global-font-on-light bg-white is-default"
              value="100">{{stakeArr.stake3}}</span></div>
          <div data-v-05b4889a="" class="input-box h-40px mx-1 flex-1 flex items-center justify-center"
            bis_skin_checked="1" (click)="stakeFocus(4)"><span data-v-05b4889a="" name="index" [ngClass]="stakeFocusnum == 4 ? 'is-focus' : 'is-default'"
              class="sum w-10 h-10 flex-1 flex justify-center items-center font-bold overflow-hidden mx-1 rounded-lg border-solid text-global-font-on-light bg-white is-default"
              value="500">{{stakeArr.stake4}}</span></div>
        </div>
        <div data-v-05b4889a="" class="keyboard" bis_skin_checked="1">
          <div data-v-05b4889a="" class="num grid grid-cols-3 bg-white p-2 pb-0" bis_skin_checked="1">

            <button *ngFor="let num of stakeNumPad" data-v-05b4889a="" (click)="numpadnum(num)" class="calc-btn" type="button" value="1" fdprocessedid="ikqbtw">{{num}}</button>
             
              <button (click)="deleteLastNumStake()"
              data-v-05b4889a="" class="calc-btn icon-backspace text-25" type="button" fdprocessedid="ar21rq"></button>
          </div>
        </div>
        <div data-v-05b4889a="" class="bg-white px-2" bis_skin_checked="1"><button data-v-05b4889a=""
            class="btn-normal p-3 font-bold rounded flex justify-center items-center disabled:bg-black-300 disabled:text-black-600 disabled:cursor-not-allowed w-full h-40px my-2"
            type="submit" fdprocessedid="gr2ay"><!---->Submit</button></div>
      </div>
    </div>
  </div>
</div>
